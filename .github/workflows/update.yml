name: Auto Merge IPTV Sources

on:
  schedule:
    # 定时任务，使用 UTC 时间。这里是每天 UTC 时间 00:00 运行 (北京时间早上 8 点)
    # 格式：分 时 日 月 周
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动点击按钮触发运行

jobs:
  merge:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run merge script
        run: python merge.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add merged_playlist.m3u
          # 如果文件有变化才提交，避免空提交报错
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update merged playlist [$(date +'%Y-%m-%d %H:%M:%S')]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
